name: Build ESP32 Firmware

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Fix broken submodules configuration and reset sdkconfig
      run: |
        git rm --cached components/protobufs || true
        git config --local --remove-section submodule.components/protobufs || true
        git submodule update --init --recursive
        # Удаляем старый конфиг S3, чтобы система создала новый под обычный ESP32
        rm -f sdkconfig

    - name: Build Firmware with ESP-IDF
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: 'v5.1'
        target: 'esp32'

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tranquil-fw-esp32-binaries
        path: |
          build/bootloader/bootloader.bin
          build/partition_table/partition-table.bin
          build/tranquil-fw.bin
          build/flasher_args.json
