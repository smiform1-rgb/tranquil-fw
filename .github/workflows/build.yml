name: Build ESP-IDF Firmware

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive' # Автоматически скачивает подмодули

    - name: Build Firmware with ESP-IDF
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: 'v5.1' # Стабильная версия, подходящая для tranquil-fw
        target: 'esp32'         # Измените на esp32s3, если ваша плата на S3
