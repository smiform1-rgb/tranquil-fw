name: Build ESP32 Firmware (Manual)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем репозиторий
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Исправляем битые подмодули Git
    - name: Fix broken submodules configuration
      run: |
        git rm --cached components/protobufs || true
        git config --local --remove-section submodule.components/protobufs || true
        git submodule update --init --recursive

    # 3. Разворачиваем компилятор нужной версии (v5.5) БЕЗ автосборки
    - name: Setup ESP-IDF Environment
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: 'v5.5' # Используем версию, которую требует проект

    # 4. Принудительно меняем цель на обычный ESP32 в терминале
    - name: Reconfigure and Build for ESP32
      run: |
        # Удаляем старый конфиг, завязанный на S3
        rm -f sdkconfig
        # Инициализируем проект под обычный ESP32 (это создаст правильный sdkconfig)
        idf.py set-target esp32
        # Запускаем сборку
        idf.py build

    # 5. Сохраняем готовые бинарники для скачивания
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tranquil-fw-esp32-binaries
        path: |
          build/bootloader/bootloader.bin
          build/partition_table/partition-table.bin
          build/tranquil-fw.bin
          build/flasher_args.json
