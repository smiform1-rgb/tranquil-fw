name: Build ESP32 Firmware

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Позволяет запускать компиляцию вручную

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем репозиторий вместе с его подмодулями
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # 2. ИИ-компиляция проекта через официальный контейнер Espressif
    - name: Build Firmware with ESP-IDF
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: 'v5.1'  # Версия SDK, оптимальная для tranquil-fw
        target: 'esp32'          # Целевой чип: обычный ESP32

    # 3. Сохраняем скомпилированные бинарники, чтобы вы могли их скачать
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tranquil-fw-esp32-binaries
        path: |
          build/bootloader/bootloader.bin
          build/partition_table/partition-table.bin
          build/tranquil-fw.bin
          build/flasher_args.json
