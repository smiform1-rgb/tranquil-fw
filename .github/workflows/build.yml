name: Build ESP32 Firmware

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем репозиторий БЕЗ автоматических подмодулей (чтобы избежать ошибки)
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. ИИ-исправление сломанного репозитория и ручной запуск submodules
    - name: Fix broken submodules configuration
      run: |
        # Удаляем упоминание сломанного подмодуля из кэша git, если оно там есть
        git rm --cached components/protobufs || true
        # Очищаем конфигурацию
        git config --local --remove-section submodule.components/protobufs || true
        # Инициализируем и обновляем только те подмодули, которые прописаны корректно
        git submodule update --init --recursive

    # 3. Компиляция проекта через контейнер Espressif
    - name: Build Firmware with ESP-IDF
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: 'v5.1'
        target: 'esp32'

    # 4. Сохраняем скомпилированные бинарники
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tranquil-fw-esp32-binaries
        path: |
          build/bootloader/bootloader.bin
          build/partition_table/partition-table.bin
          build/tranquil-fw.bin
          build/flasher_args.json
