name: Build ESP32 Firmware (Direct Container)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Запускаем всю сборку прямо внутри официального Docker-окружения ESP-IDF
    container:
      image: espressif/idf:v5.5

    steps:
    # 1. Скачиваем репозиторий
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. ИИ-исправление битых подмодулей Git внутри контейнера
    - name: Fix broken submodules configuration
      run: |
        git config --global --add safe.directory /__w/tranquil-fw/tranquil-fw
        git rm --cached components/protobufs || true
        git config --local --remove-section submodule.components/protobufs || true
        git submodule update --init --recursive

    # 3. Полный сброс конфигурации и принудительная компиляция под обычный ESP32
    - name: Reconfigure and Build for ESP32
      run: |
        # Переключаемся на встроенную оболочку ESP-IDF (активирует нужный Python и пути)
        . /opt/esp/idf/export.sh
        
        # Удаляем старый sdkconfig, завязанный разработчиками на ESP32-S3
        rm -f sdkconfig
        
        # Задаем жесткую цель компиляции — обычный ESP32
        idf.py set-target esp32
        
        # Запускаем сборку прошивки
        idf.py build

    # 4. Выгружаем скомпилированные файлы
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tranquil-fw-esp32-binaries
        path: |
          build/bootloader/bootloader.bin
          build/partition_table/partition-table.bin
          build/tranquil-fw.bin
          build/flasher_args.json
