name: Build ESP32-S3 Firmware (Original)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.1

    steps:
    # 1. Скачиваем репозиторий
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Исправляем битые подмодули Git
    - name: Fix broken submodules configuration
      run: |
        git config --global --add safe.directory /__w/tranquil-fw/tranquil-fw
        git rm --cached components/protobufs || true
        git config --local --remove-section submodule.components/protobufs || true
        git submodule update --init --recursive

    # 3. Компиляция под ESP32-S3 (конфигурация по умолчанию)
    - name: Build for ESP32-S3
      run: |
        . /opt/esp/idf/export.sh
        idf.py build

    # 4. Сохраняем бинарники для скачивания
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tranquil-fw-esp32s3-binaries
        path: |
          build/bootloader/bootloader.bin
          build/partition_table/partition-table.bin
          build/tranquil-fw.bin
          build/flasher_args.json
